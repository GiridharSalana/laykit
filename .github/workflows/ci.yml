name: CI

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

      - name: Run doc tests
        run: cargo test --doc

      - name: Build release
        run: cargo build --release

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "tests/pyproject.toml"

      - name: Run gdstk cross-validation tests
        working-directory: tests
        run: uv run gdstk_validation.py

  build-binaries:
    name: Build Release Binaries (${{ matrix.artifact_name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: laykit-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: laykit-windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: laykit-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: laykit-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run examples (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          cargo run --release --target ${{ matrix.target }} --example gdsii_only
          cargo run --release --target ${{ matrix.target }} --example oasis_only
          cargo run --release --target ${{ matrix.target }} --example basic_usage

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/examples/*.exe artifacts/ 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/examples/gdsii_only artifacts/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/examples/oasis_only artifacts/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/examples/basic_usage artifacts/ 2>/dev/null || true
          fi
          cp README.md CHANGELOG.md LICENSE artifacts/

      - name: Create archive
        shell: bash
        run: |
          cd artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../${{ matrix.artifact_name }}.zip *
          else
            tar czf ../${{ matrix.artifact_name }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip

  docs:
    name: Build Documentation
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build mdBook
        run: mdbook build

      - name: Generate rustdoc
        run: cargo doc --no-deps --all-features

      - name: Combine docs
        run: |
          mkdir -p target/pages
          cp -r book/build/* target/pages/
          mkdir -p target/pages/api
          cp -r target/doc/* target/pages/api/
          printf '<!DOCTYPE html><html><head><meta charset="utf-8"><title>LayKit API</title>' > target/pages/api/index.html
          printf '<meta http-equiv="refresh" content="0; url=laykit/index.html"></head>' >> target/pages/api/index.html
          printf '<body><a href="laykit/index.html">API docs</a></body></html>' >> target/pages/api/index.html
          touch target/pages/.nojekyll

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/pages

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    needs: deploy-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Crates.io
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep -E '^version\s*=' Cargo.toml | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "✗ Version mismatch: Cargo.toml=$CARGO_VERSION, Tag=$VERSION"
            exit 1
          fi
          echo "✓ Version: $CARGO_VERSION"

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
